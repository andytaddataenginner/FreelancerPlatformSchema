<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clients — QFA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d2353; --accent: #1a5cff; --gold2: #f5c842;
      --white: #fff; --bg: #f4f6fb; --bg2: #eef1f8;
      --ink: #0d2353; --ink2: #3a4a6a; --ink3: #7a8aaa;
      --green: #166534; --green-bg: #dcfce7;
      --amber: #92400e; --amber-bg: #fef3c7;
      --red: #b91c1c; --red-bg: #fee2e2;
      --gray: #4b5563; --gray-bg: #f3f4f6;
      --sans: 'Outfit', system-ui, sans-serif;
      --serif: 'Playfair Display', serif;
      --radius: 14px; --shadow: 0 2px 20px rgba(13,35,83,0.08);
    }
    html, body { font-family: var(--sans); background: var(--bg); color: var(--ink); }

    /* ── LAYOUT FIXES ── */
    .layout { display: flex; min-height: 100vh; }

    /* ── SIDEBAR DEFAULT (Desktop - Visible on left) ── */
    .sidebar {
      width: 240px !important; 
      background: var(--navy) !important; 
      position: fixed !important;
      top: 0 !important; 
      left: 0 !important; 
      height: 100vh !important; 
      display: flex !important;
      flex-direction: column !important; 
      z-index: 150 !important;
      transform: translateX(0); /* Visible on desktop */
      transition: transform 0.3s ease-in-out !important;
    }
    
    .sidebar-brand {
      padding: 1.2rem 1.5rem !important;
      border-bottom: 1px solid rgba(255,255,255,0.08) !important;
      display: flex !important; 
      align-items: center !important; 
      gap: 0.7rem !important;
      flex-direction: row !important;
      justify-content: flex-start !important;
      width: 100% !important;
    }
    .brand-logo { width: 36px; height: 36px; background: white; border-radius: 8px; overflow: hidden; padding: 3px; flex-shrink: 0; }
    .brand-logo img { width: 100%; height: 100%; object-fit: contain; }
    .brand-text strong { display: block; color: white; font-size: 0.78rem; font-weight: 700; }
    .brand-text span { font-size: 0.62rem; color: var(--gold2); text-transform: uppercase; letter-spacing: 0.08em; }

    .sidebar-nav { 
      flex: 1 !important; 
      padding: 0.8rem 0 !important; 
      overflow-y: auto !important;
      display: flex !important;
      flex-direction: column !important; 
      gap: 0.2rem !important;
      width: 100% !important;
    }
    .sidebar-nav a {
      display: flex !important; 
      align-items: center !important; 
      gap: 0.7rem !important;
      padding: 0.8rem 1.5rem !important; 
      font-size: 0.88rem !important; 
      font-weight: 500 !important;
      color: rgba(255,255,255,0.65) !important; 
      text-decoration: none !important;
      transition: all 0.2s; 
      border-right: 4px solid transparent !important;
      border-left: none !important;
      width: 100% !important;
      box-sizing: border-box !important;
      justify-content: flex-start !important;
    }
    .sidebar-nav a:hover { color: white !important; background: rgba(255,255,255,0.06) !important; }
    .sidebar-nav a.active { color: white !important; background: rgba(26,92,255,0.2) !important; border-right-color: var(--gold2) !important; }

    .sidebar-user { 
      padding: 1.2rem 1.5rem !important; 
      border-top: 1px solid rgba(255,255,255,0.08) !important; 
      font-size: 0.8rem !important;
      display: flex !important;
      flex-direction: column !important;
      width: 100% !important;
    }
    .sidebar-user strong { display: block; color: white; margin-bottom: 0.1rem; }
    .sidebar-user span { color: rgba(255,255,255,0.4); font-size: 0.72rem; }
    .sidebar-user a { display: block; margin-top: 0.4rem; font-size: 0.75rem; color: var(--gold2); text-decoration: none; }

    /* ── MOBILE NAV BAR ── */
    .mobile-header {
      display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--navy); padding: 0.8rem 1rem;
      align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(13,35,83,0.2);
    }
    .mobile-logo { display: flex; align-items: center; gap: 0.5rem; }
    .mobile-logo img { height: 32px; background: white; border-radius: 6px; padding: 2px; }
    .mobile-logo span { color: white; font-size: 0.85rem; font-weight: 700; }
    .hamburger-btn {
      background: rgba(255,255,255,0.1); border: none; color: white;
      width: 36px; height: 36px; border-radius: 8px; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    
    /* ── OVERLAY BACKDROP ── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 120; backdrop-filter: blur(2px);
    }

    /* ── MAIN CONTENT AREA ── */
    .main { margin-left: 240px; flex: 1; padding: 0; }
    .topbar {
      background: white; border-bottom: 1px solid rgba(13,35,83,0.08);
      padding: 1rem 1.5rem; position: sticky; top: 0; z-index: 40;
    }
    .topbar h2 { font-family: var(--serif); font-size: 1.4rem; }
    .topbar p  { font-size: 0.8rem; color: var(--ink3); margin-top: 0.1rem; }
    .content { padding: 1.5rem; }

    /* ── CARDS & BADGES ── */
    .card {
      background: white; border-radius: var(--radius); padding: 1.2rem;
      box-shadow: var(--shadow); border: 1px solid rgba(13,35,83,0.05);
    }
    .badge { display: inline-block; padding: 0.18rem 0.6rem; border-radius: 100px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-blue  { background: #dbeafe; color: #1e40af; }
    .badge-gray  { background: var(--gray-bg); color: var(--gray); }

    /* ── BUTTONS ── */
    .btn-primary { padding: 0.6rem 1.2rem; background: var(--navy); color: white; border: none; border-radius: 8px; font-family: var(--sans); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary:hover { background: var(--accent); }
    .btn-sm { padding: 0.4rem 0.8rem; border-radius: 6px; font-family: var(--sans); font-size: 0.75rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.2rem; white-space: nowrap; }
    .btn-green { background: var(--green-bg); color: var(--green); }
    .btn-green:hover { background: var(--green); color: white; }
    .btn-red { background: var(--red-bg); color: var(--red); }
    .btn-red:hover { background: var(--red); color: white; }
    .btn-outline { background: transparent; border: 1.5px solid rgba(13,35,83,0.15); color: var(--ink2); }
    .btn-outline:hover { border-color: var(--navy); color: var(--navy); }

    /* ── MODALS ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(13,35,83,0.5); display: none; align-items: center; justify-content: center; z-index: 200; padding: 1rem; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 18px; padding: 1.5rem; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(13,35,83,0.2); animation: modalIn 0.25s ease; }
    @keyframes modalIn { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none} }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
    .modal-header h3 { font-family: var(--serif); font-size: 1.2rem; }
    .modal-close { background: var(--bg); border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 0.9rem; color: var(--ink3); display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: var(--red-bg); color: var(--red); }
    
    .modal-form { display: flex; flex-direction: column; gap: 0.8rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink2); }
    .form-group input, .form-group select, .form-group textarea {
      padding: 0.7rem 0.9rem; border: 1.5px solid rgba(13,35,83,0.1);
      border-radius: 9px; background: var(--bg); font-family: var(--sans);
      font-size: 0.88rem; color: var(--navy); width: 100%;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-status { font-size: 0.8rem; margin-top: 0.2rem; }
    .form-status.success { color: var(--green); }
    .form-status.error   { color: var(--red); }

    /* ── RESPONSIVE MEDIA QUERIES ── */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); } /* Hides sidebar only on mobile screen */
      .sidebar.is-open { transform: translateX(0) !important; }
      .sidebar-overlay.visible { display: block !important; }
      .main { margin-left: 0 !important; padding-top: 56px !important; }
      .mobile-header { display: flex !important; }
      .topbar { top: 56px !important; }
      .content { padding: 1rem !important; }
      #clients-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>

<!-- Mobile Header -->
<div class="mobile-header" id="mobile-header">
  <div class="mobile-logo">
    <img src="../QFA_Logo.png" alt="QFA"/>
    <span>QFA</span>
  </div>
  <button class="hamburger-btn" onclick="openSidebar()">☰</button>
</div>

<!-- Backdrop Scrim -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo"><img src="../QFA_Logo.png" alt="QFA"/></div>
      <div class="brand-text"><strong>Quick Freelancing</strong><span>Agency</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">📊 Overview</a>
      <a href="time-logs.html">⏱ Time Logs</a>
      <a href="clients.html" class="active">👥 Clients</a>
      <a href="schedule.html">📅 Schedule</a>
      <a href="portfolio-admin.html">🖼 Portfolio</a>
      <a href="../index.html" target="_blank">🌐 Public Site</a>
    </nav>
    <div class="sidebar-user">
      <strong id="user-name">Loading…</strong>
      <span>Freelancer · QFA</span>
      <a href="#" onclick="logout()">Sign out →</a>
    </div>
  </aside>

  <!-- MAIN WRAPPER -->
  <div class="main">
    <div class="topbar">
      <h2>Clients</h2>
      <p>Manage clients, billing rates, and payment status.</p>
    </div>

    <div class="content">
      <div style="margin-bottom:1.5rem">
        <button class="btn-primary" onclick="document.getElementById('modal-add').classList.add('open')">+ Add New Client</button>
      </div>

      <div id="clients-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.2rem">
        <p style="color:var(--ink3)">Loading…</p>
      </div>
    </div>
  </div>
</div>

<!-- Add Client Modal -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <div class="modal-header">
      <h3>Add New Client</h3>
      <button class="modal-close" onclick="document.getElementById('modal-add').classList.remove('open')">✕</button>
    </div>
    <form class="modal-form" onsubmit="addClient(event)">
      <div class="form-group"><label>Full name</label><input type="text" name="name" required/></div>
      <div class="form-group"><label>Email address</label><input type="email" name="email" required/></div>
      <div class="form-group"><label>Company (optional)</label><input type="text" name="company"/></div>
      <div class="form-group"><label>Temporary password</label><input type="text" name="password" required placeholder="Client uses this to log in"/></div>
      <div style="border-top:1px solid var(--bg2);padding-top:1rem;margin-top:0.5rem">
        <p style="font-size:0.85rem;font-weight:600;margin-bottom:0.8rem;color:var(--ink)">💰 Billing Settings</p>
        <div class="form-group">
          <label>Rate type</label>
          <select name="rate_type" id="add-rate-type" onchange="toggleRateFields('add')">
            <option value="hourly">Hourly rate</option>
            <option value="fixed">Fixed price project</option>
          </select>
        </div>
        <div class="form-group" id="add-hourly-field">
          <label>Your hourly rate ($)</label>
          <input type="number" name="hourly_rate" min="1" step="0.5" placeholder="e.g. 25"/>
        </div>
        <div class="form-group" id="add-fixed-field" style="display:none">
          <label>Fixed project price ($)</label>
          <input type="number" name="fixed_price" min="1" step="1" placeholder="e.g. 500"/>
        </div>
      </div>
      <button type="submit" class="btn-primary" style="margin-top:0.5rem">Create client</button>
      <div id="add-status" class="form-status"></div>
    </form>
  </div>
</div>

<!-- Edit Client Modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit Client</h3>
      <button class="modal-close" onclick="document.getElementById('modal-edit').classList.remove('open')">✕</button>
    </div>
    <form class="modal-form" onsubmit="saveClient(event)">
      <input type="hidden" name="id" id="edit-id"/>
      <div class="form-group"><label>Full name</label><input type="text" name="name" id="edit-name" required/></div>
      <div class="form-group"><label>Company</label><input type="text" name="company" id="edit-company"/></div>
      <div class="form-group"><label>Notes</label><textarea name="notes" id="edit-notes" rows="2"></textarea></div>
      <div style="border-top:1px solid var(--bg2);padding-top:1rem;margin-top:0.5rem">
        <p style="font-size:0.85rem;font-weight:600;margin-bottom:0.8rem;color:var(--ink)">💰 Billing Settings</p>
        <div class="form-group">
          <label>Rate type</label>
          <select name="rate_type" id="edit-rate-type" onchange="toggleRateFields('edit')">
            <option value="hourly">Hourly rate</option>
            <option value="fixed">Fixed price project</option>
          </select>
        </div>
        <div class="form-group" id="edit-hourly-field">
          <label>Your hourly rate ($)</label>
          <input type="number" name="hourly_rate" id="edit-hourly-rate" min="1" step="0.5"/>
        </div>
        <div class="form-group" id="edit-fixed-field" style="display:none">
          <label>Fixed project price ($)</label>
          <input type="number" name="fixed_price" id="edit-fixed-price" min="1" step="1"/>
        </div>
      </div>
      <button type="submit" class="btn-primary" style="margin-top:0.5rem">Save changes</button>
      <div id="edit-status" class="form-status"></div>
    </form>
  </div>
</div>

<script>
const API = 'https://freelancer-platform-9jut.onrender.com/api';
const auth = {
  token: () => localStorage.getItem('token'),
  user:  () => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } },
  clear: () => { localStorage.removeItem('token'); localStorage.removeItem('user'); },
  isLoggedIn: () => !!localStorage.getItem('token'),
  headers: () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') })
};

async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, { ...options, headers: { ...auth.headers(), ...(options.headers||{}) } });
  if (res.status === 401) { auth.clear(); window.location.href = 'login.html'; return; }
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error||'Failed'); }
  return res.json();
}

(function() {
  if (!auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
  document.getElementById('user-name').textContent = auth.user()?.name || '';
})();

function logout() { auth.clear(); window.location.href = 'login.html'; }

function toggleRateFields(prefix) {
  const type = document.getElementById(prefix + '-rate-type').value;
  document.getElementById(prefix + '-hourly-field').style.display = type === 'hourly' ? 'flex' : 'none';
  document.getElementById(prefix + '-fixed-field').style.display  = type === 'fixed'  ? 'flex' : 'none';
}

async function loadClients() {
  try {
    const clients = await apiFetch('/clients');
    const grid = document.getElementById('clients-grid');
    if (!clients.length) {
      grid.innerHTML = '<p style="color:var(--ink3)">No clients yet. Add your first one!</p>';
      return;
    }
    grid.innerHTML = clients.map(c => {
      const isFixed = c.rate_type === 'fixed';
      const isPaid  = c.fixed_payment_status === 'paid';

      const rateInfo = isFixed
        ? `<span class="badge badge-blue">Fixed</span> <strong>$${parseFloat(c.fixed_price||0).toFixed(2)}</strong>`
        : `<span class="badge badge-green">Hourly</span> <strong>$${parseFloat(c.hourly_rate||0).toFixed(2)}/hr</strong>`;

      const fixedPayBtn = isFixed ? `
        <div style="margin:0.8rem 0;padding:0.8rem;background:${isPaid?'#dcfce7':'#fef3c7'};border-radius:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.4rem">
          <span style="font-size:0.82rem;font-weight:600;color:${isPaid?'#166534':'#92400e'}">
            ${isPaid ? '✅ Fixed payment received' : '⏳ Fixed payment pending'}
          </span>
          <button class="btn-sm ${isPaid?'btn-outline':'btn-green'}"
            onclick="toggleFixedPayment(${c.id}, '${isPaid?'unpaid':'paid'}')">
            ${isPaid ? 'Mark unpaid' : 'Mark paid ✓'}
          </button>
        </div>` : '';

      return `
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.8rem;gap:0.5rem">
            <div>
              <div style="font-weight:600;font-size:1rem">${c.name}</div>
              <div style="font-size:0.82rem;color:var(--ink3);word-break:break-all">${c.company || c.email}</div>
            </div>
            <span class="badge ${c.is_active ? 'badge-green' : 'badge-gray'}">${c.is_active ? 'Active' : 'Inactive'}</span>
          </div>
          <div style="display:flex;gap:0.8rem;font-size:0.82rem;color:var(--ink2);margin-bottom:0.8rem;flex-wrap:wrap">
            <span>⏱ ${parseFloat(c.total_hours||0).toFixed(1)}h logged</span>
            <span>📋 ${c.log_count || 0} entries</span>
            <span>💰 ${rateInfo}</span>
          </div>
          ${fixedPayBtn}
          <div style="display:flex;gap:0.6rem;margin-top:0.5rem">
            <button class="btn-sm btn-outline" onclick='openEdit(${JSON.stringify(c).replace(/'/g,"&#39;")})'>Edit</button>
            <button class="btn-sm btn-red" onclick="deleteClient(${c.id}, '${c.name}')">Remove</button>
          </div>
        </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}

async function toggleFixedPayment(clientId, newStatus) {
  try {
    await apiFetch('/clients/' + clientId + '/fixed-payment', {
      method: 'PATCH',
      body: JSON.stringify({ fixed_payment_status: newStatus })
    });
    loadClients();
  } catch(e) { alert('Failed: ' + e.message); }
}

function openEdit(c) {
  document.getElementById('edit-id').value          = c.id;
  document.getElementById('edit-name').value        = c.name;
  document.getElementById('edit-company').value     = c.company || '';
  document.getElementById('edit-notes').value       = c.notes || '';
  document.getElementById('edit-rate-type').value   = c.rate_type || 'hourly';
  document.getElementById('edit-hourly-rate').value = c.hourly_rate || '';
  document.getElementById('edit-fixed-price').value = c.fixed_price || '';
  toggleRateFields('edit');
  document.getElementById('modal-edit').classList.add('open');
}

async function addClient(e) {
  e.preventDefault();
  const status = document.getElementById('add-status');
  try {
    await apiFetch('/clients', { method: 'POST', body: JSON.stringify(Object.fromEntries(new FormData(e.target))) });
    status.className = 'form-status success';
    status.textContent = '✓ Client created!';
    e.target.reset();
    setTimeout(() => { document.getElementById('modal-add').classList.remove('open'); status.textContent=''; }, 1200);
    loadClients();
  } catch(err) { status.className = 'form-status error'; status.textContent = err.message; }
}

async function saveClient(e) {
  e.preventDefault();
  const status = document.getElementById('edit-status');
  const data = Object.fromEntries(new FormData(e.target));
  try {
    await apiFetch('/clients/' + data.id, { method: 'PUT', body: JSON.stringify(data) });
    status.className = 'form-status success'; status.textContent = '✓ Saved!';
    setTimeout(() => { document.getElementById('modal-edit').classList.remove('open'); status.textContent=''; }, 1000);
    loadClients();
  } catch(err) { status.className = 'form-status error'; status.textContent = err.message; }
}

async function deleteClient(id, name) {
  if (!confirm(`Remove client "${name}"?`)) return;
  try { await apiFetch('/clients/' + id, { method: 'DELETE' }); loadClients(); }
  catch(e) { alert('Failed: ' + e.message); }
}

loadClients();
</script>

<!-- Mobile Navigation Trigger Logic -->
<script>
function openSidebar() {
  document.getElementById('sidebar').classList.add('is-open');
  document.getElementById('sidebar-overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('is-open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
  document.body.style.overflow = '';
}
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.sidebar-nav a').forEach(function(a) {
    a.addEventListener('click', function() {
      if (window.innerWidth <= 768) closeSidebar();
    });
  });
});
</script>

</body>
</html>
