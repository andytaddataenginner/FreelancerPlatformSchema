<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book a Session — YourName</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>

</head>
<body>

<div class="mobile-topbar">
  <div class="mobile-topbar-brand">
    <img src="../QFA_Logo.png" alt="QFA"/>
    <span>Quick Freelancing Agency</span>
  </div>
  <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>


<div class="mobile-topbar">
  <div class="mobile-topbar-brand">
    <img src="../QFA_Logo.png" alt="QFA"/>
    <span>Quick Freelancing Agency</span>
  </div>
  <button class="mobile-menu-btn" onclick="openSidebar()">☰</button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-brand" style="padding:1.2rem 1.5rem;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:0.7rem"><div style="width:38px;height:38px;background:white;border-radius:8px;overflow:hidden;padding:3px;flex-shrink:0"><img src="../QFA_Logo.png" style="width:100%;height:100%;object-fit:contain"/></div><div style="line-height:1.2"><div style="color:white;font-size:0.8rem;font-weight:700">Quick Freelancing</div><div style="color:#f5c842;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em">Agency</div></div></div>
    <nav class="sidebar-nav">
      <a href="client-portal.html">📊 My Overview</a>
      <a href="client-logs.html">⏱ My Time Logs</a>
      <a href="client-schedule.html" class="active">📅 Book a Session</a>
      <a href="../index.html" target="_blank">🌐 Portfolio</a>
    </nav>
    <div class="sidebar-user">
      <strong id="user-name">Loading…</strong>
      <a href="#" onclick="logout()" style="color:var(--accent);font-size:0.8rem;margin-top:0.4rem;display:inline-block">Sign out</a>
    </div>
  </aside>

  <main class="main-content">
    <h2 class="page-title">Book a Session</h2>
    <p class="page-sub">Request a meeting or working session. I'll confirm within 24 hours.</p>

    <!-- Booking form -->
    <div class="card" style="max-width:620px;margin-bottom:2rem">
      <div class="card-header"><h3>📅 New Booking Request</h3></div>
      <form onsubmit="bookSession(event)" style="display:grid;grid-template-columns:1fr 1fr;gap:1.1rem">
        <div class="form-group">
          <label>Preferred date</label>
          <input type="date" name="date" id="book-date" required/>
        </div>
        <div class="form-group">
          <label>Preferred time</label>
          <select name="time" required>
            <option value="">Select time…</option>
            <option value="09:00">9:00 AM</option>
            <option value="10:00">10:00 AM</option>
            <option value="11:00">11:00 AM</option>
            <option value="13:00">1:00 PM</option>
            <option value="14:00">2:00 PM</option>
            <option value="15:00">3:00 PM</option>
            <option value="16:00">4:00 PM</option>
          </select>
        </div>
        <div class="form-group">
          <label>Session type</label>
          <select name="type" required>
            <option value="">Select type…</option>
            <option value="call">Video call / meeting</option>
            <option value="review">Project review</option>
            <option value="workshop">Working session</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Duration</label>
          <select name="duration" required>
            <option value="0.5">30 minutes</option>
            <option value="1" selected>1 hour</option>
            <option value="1.5">1.5 hours</option>
            <option value="2">2 hours</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Message / agenda</label>
          <textarea name="message" rows="3" placeholder="What would you like to discuss or work on?"></textarea>
        </div>
        <div style="grid-column:1/-1">
          <button type="submit" class="btn-primary">Send booking request →</button>
          <div id="book-status" class="form-status" style="margin-top:0.6rem"></div>
        </div>
      </form>
    </div>

    <!-- Upcoming bookings -->
    <div class="card">
      <div class="card-header"><h3>Your Sessions</h3></div>
      <div id="bookings-list"><p style="color:var(--ink3)">Loading…</p></div>
    </div>
  </main>
</div>

<script>
const API = 'https://freelancer-platform-9jut.onrender.com/api';
const auth = {
  token: () => localStorage.getItem('token'),
  user:  () => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } },
  clear: () => { localStorage.removeItem('token'); localStorage.removeItem('user'); },
  isLoggedIn: () => !!localStorage.getItem('token'),
  headers: () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') })
};
async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, { ...options, headers: { ...auth.headers(), ...(options.headers||{}) } });
  if (res.status === 401) { auth.clear(); window.location.href = 'login.html'; return; }
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error||'Failed'); }
  return res.json();
}
(function() {
  if (!auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
  const u = auth.user();
  if (u && u.role !== 'client') { window.location.href = 'dashboard.html'; return; }
  document.getElementById('user-name').textContent = u ? u.name : '';
  document.getElementById('book-date').min = new Date().toISOString().slice(0,10);
})();
function logout() { auth.clear(); window.location.href = '../index.html'; }

const TYPE_LABELS = { call:'Video call / meeting', review:'Project review', workshop:'Working session', other:'Other' };

async function loadBookings() {
  try {
    const bookings = await apiFetch('/client/bookings');
    const list = document.getElementById('bookings-list');

    if (!bookings.length) {
      list.innerHTML = '<p style="color:var(--ink3);font-size:0.9rem">No sessions yet. Book your first one above!</p>';
      return;
    }

    // Sort: upcoming first, then past
    const now = new Date();
    const upcoming = bookings.filter(b => new Date(b.date) >= now && b.status !== 'cancelled');
    const past     = bookings.filter(b => new Date(b.date) <  now || b.status === 'cancelled');

    let html = '';

    if (upcoming.length) {
      html += '<p style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink3);font-weight:500;margin-bottom:0.6rem">Upcoming</p>';
      html += upcoming.map(b => bookingCard(b)).join('');
    }

    if (past.length) {
      html += '<p style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink3);font-weight:500;margin:1.2rem 0 0.6rem">Past / Cancelled</p>';
      html += past.map(b => bookingCard(b)).join('');
    }

    list.innerHTML = html;
  } catch(e) { console.error(e); }
}

function bookingCard(b) {
  const badgeClass = b.status === 'confirmed' ? 'badge-green'
                   : b.status === 'pending'   ? 'badge-amber'
                   : 'badge-gray';
  const cancelBtn = b.status !== 'cancelled' && new Date(b.date) >= new Date()
    ? `<button class="btn-sm btn-red" onclick="cancelBooking(${b.id})" style="margin-top:0.6rem">Cancel request</button>`
    : '';
  return `
    <div style="padding:1rem;border:1.5px solid var(--paper3);border-radius:10px;margin-bottom:0.8rem">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem">
        <div>
          <div style="font-weight:600;font-size:0.95rem">${TYPE_LABELS[b.type] || b.type}</div>
          <div style="color:var(--ink2);font-size:0.85rem;margin-top:0.2rem">
            📅 ${new Date(b.date).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
            &nbsp;·&nbsp; 🕐 ${b.time} &nbsp;·&nbsp; ⏱ ${b.duration}h
          </div>
          ${b.message ? `<div style="color:var(--ink3);font-size:0.82rem;margin-top:0.4rem">💬 ${b.message}</div>` : ''}
          ${cancelBtn}
        </div>
        <span class="badge ${badgeClass}" style="white-space:nowrap">${b.status}</span>
      </div>
    </div>`;
}

async function bookSession(e) {
  e.preventDefault();
  const status = document.getElementById('book-status');
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    await apiFetch('/client/bookings', {
      method: 'POST',
      body: JSON.stringify(Object.fromEntries(new FormData(e.target)))
    });
    status.className = 'form-status success';
    status.textContent = '✓ Booking request sent! I\'ll confirm within 24 hours.';
    e.target.reset();
    document.getElementById('book-date').min = new Date().toISOString().slice(0,10);
    loadBookings();
  } catch(err) {
    status.className = 'form-status error';
    status.textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send booking request →';
  }
}

async function cancelBooking(id) {
  if (!confirm('Cancel this booking request?')) return;
  try {
    await apiFetch('/client/bookings/' + id, { method: 'DELETE' });
    loadBookings();
  } catch(e) { alert('Failed: ' + e.message); }
}

loadBookings();
</script>

<script>
function openSidebar() {
  document.getElementById('sidebar').classList.add('is-open');
  document.getElementById('sidebar-overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('is-open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
  document.body.style.overflow = '';
}
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.sidebar-nav a').forEach(function(a) {
    a.addEventListener('click', function() {
      if (window.innerWidth <= 768) closeSidebar();
    });
  });
});
</script>

</body>
</html>
