<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Quick Freelancing Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="page-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:1.8rem">
      <a href="../index.html" style="font-family:var(--serif);font-size:1.5rem;color:var(--ink)">Quick Freelancing Agency<span class="dot">.</span></a>
    </div>
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your account to continue</p>

    <div id="alert-box" class="alert alert-error" style="display:none"></div>

    <form class="auth-form" id="login-form">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="button" class="btn-primary" id="login-btn" onclick="doLogin()">Sign in</button>
    </form>
    <p class="auth-link" style="margin-top:1.2rem">
      <a href="../index.html">← Back to portfolio</a>
    </p>
  </div>
</div>

<script>
// ── PASTE YOUR RENDER URL BELOW (keep /api at the end) ──────
const API = 'https://freelancer-platform-9jut.onrender.com/api';

// ── Auth helpers ─────────────────────────────────────────────
const auth = {
  token: () => localStorage.getItem('token'),
  user:  () => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } },
  save:  (token, user) => { localStorage.setItem('token', token); localStorage.setItem('user', JSON.stringify(user)); },
  clear: () => { localStorage.removeItem('token'); localStorage.removeItem('user'); },
  isLoggedIn: () => !!localStorage.getItem('token'),
};

// Redirect if already logged in
(function() {
  if (auth.isLoggedIn()) {
    const u = auth.user();
    window.location.href = u && u.role === 'client' ? 'client-portal.html' : 'dashboard.html';
  }
})();

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const alertBox = document.getElementById('alert-box');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if (!email || !password) {
    alertBox.textContent = 'Please enter your email and password.';
    alertBox.style.display = 'block';
    return;
  }

  btn.textContent = 'Signing in…';
  btn.disabled = true;
  alertBox.style.display = 'none';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Invalid email or password.');
    }

    auth.save(data.token, data.user);
    window.location.href = data.user.role === 'client' ? 'client-portal.html' : 'dashboard.html';

  } catch (err) {
    alertBox.textContent = err.message || 'Invalid email or password.';
    alertBox.style.display = 'block';
    btn.textContent = 'Sign in';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
